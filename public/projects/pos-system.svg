<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="posBg" cx="30%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#141a26"/>
      <stop offset="100%" stop-color="#0a0e16"/>
    </radialGradient>
    <linearGradient id="posAccent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
    <linearGradient id="posAccent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
    <pattern id="posGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(231,238,245,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="350" fill="url(#posBg)"/>
  <rect width="800" height="350" fill="url(#posGrid)"/>
  <circle cx="640" cy="80" r="180" fill="#2dd4bf" opacity="0.12"/>
  <circle cx="120" cy="300" r="150" fill="#6c63ff" opacity="0.10"/>

  <!-- register / till -->
  <g transform="translate(90,110)">
    <rect x="0" y="40" width="200" height="130" rx="18" fill="url(#posAccent1)" opacity="0.9"/>
    <rect x="18" y="0" width="164" height="70" rx="12" fill="#141a26" stroke="rgba(231,238,245,0.25)" stroke-width="2"/>
    <rect x="34" y="16" width="132" height="38" rx="6" fill="#28c840" opacity="0.35"/>
    <rect x="34" y="16" width="90" height="38" rx="6" fill="#28c840" opacity="0.55"/>
    <g fill="#0a0e16" opacity="0.85">
      <rect x="18" y="80" width="36" height="24" rx="6"/>
      <rect x="62" y="80" width="36" height="24" rx="6"/>
      <rect x="106" y="80" width="36" height="24" rx="6"/>
      <rect x="150" y="80" width="36" height="24" rx="6"/>
      <rect x="18" y="112" width="36" height="24" rx="6"/>
      <rect x="62" y="112" width="36" height="24" rx="6"/>
      <rect x="106" y="112" width="36" height="24" rx="6"/>
      <rect x="150" y="112" width="36" height="24" rx="6"/>
    </g>
  </g>

  <!-- receipt -->
  <g transform="translate(330,60)">
    <rect x="0" y="0" width="120" height="200" rx="10" fill="#111827" stroke="rgba(231,238,245,0.18)" stroke-width="2"/>
    <path d="M0 200 L15 214 L30 200 L45 214 L60 200 L75 214 L90 200 L105 214 L120 200 L120 200 0 200Z" fill="#111827" stroke="rgba(231,238,245,0.18)" stroke-width="2"/>
    <g fill="rgba(231,238,245,0.5)">
      <rect x="16" y="24" width="88" height="8" rx="4"/>
      <rect x="16" y="46" width="60" height="6" rx="3"/>
      <rect x="16" y="62" width="70" height="6" rx="3"/>
      <rect x="16" y="78" width="50" height="6" rx="3"/>
      <rect x="16" y="94" width="65" height="6" rx="3"/>
    </g>
    <rect x="16" y="118" width="88" height="2" fill="rgba(231,238,245,0.25)"/>
    <rect x="16" y="132" width="88" height="10" rx="5" fill="url(#posAccent2)"/>
  </g>

  <!-- credit card -->
  <g transform="translate(520,140) rotate(-8)">
    <rect x="0" y="0" width="150" height="94" rx="14" fill="url(#posAccent2)"/>
    <rect x="16" y="20" width="34" height="24" rx="5" fill="#0a0e16" opacity="0.45"/>
    <rect x="16" y="60" width="90" height="8" rx="4" fill="#0a0e16" opacity="0.3"/>
    <circle cx="126" cy="70" r="14" fill="#0a0e16" opacity="0.25"/>
  </g>

  <!-- phone / UPI qr -->
  <g transform="translate(600,40)">
    <rect x="0" y="0" width="80" height="150" rx="16" fill="#141a26" stroke="rgba(231,238,245,0.2)" stroke-width="2"/>
    <rect x="12" y="16" width="56" height="80" rx="4" fill="#fff"/>
    <g fill="#0a0e16">
      <rect x="18" y="22" width="12" height="12"/>
      <rect x="38" y="22" width="12" height="12"/>
      <rect x="58" y="22" width="6" height="12"/>
      <rect x="18" y="42" width="6" height="12"/>
      <rect x="32" y="42" width="12" height="12"/>
      <rect x="52" y="42" width="12" height="12"/>
      <rect x="18" y="62" width="12" height="12"/>
      <rect x="44" y="62" width="18" height="12"/>
      <rect x="18" y="82" width="46" height="8"/>
    </g>
    <circle cx="40" cy="120" r="8" fill="rgba(231,238,245,0.3)"/>
  </g>

  <!-- floating coins -->
  <circle cx="260" cy="270" r="16" fill="none" stroke="url(#posAccent1)" stroke-width="3"/>
  <circle cx="290" cy="290" r="10" fill="none" stroke="url(#posAccent2)" stroke-width="3"/>
  <circle cx="460" cy="290" r="13" fill="none" stroke="#28c840" stroke-width="3" opacity="0.7"/>
</svg>
